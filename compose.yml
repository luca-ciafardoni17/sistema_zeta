services:
  # ------------ Database ------------ #
  storage-db:
    image: postgres:latest
    container_name: zeta_storage
    environment:
      POSTGRES_DB: zeta_storage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - storage_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zeta_storage"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zeta-net
  auth-db:
    image: mysql:latest
    container_name: zeta_auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zeta_auth
    ports:
      - "3307:3306"
    volumes:
      - auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zeta-net
  userdetails-db:
    image: mysql:latest
    container_name: zeta_userdetails
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zeta_userdetails
    ports:
      - "3308:3306"
    volumes:
      - userdetails_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zeta-net

  # ------------ Kafka ------------ #
  # kafka:
  #  image: confluentinc/cp-kafka:latest
  #  ports:
  #    - "9092:9092"
  #  environment:
  #    KAFKA_NODE_ID: ...
  #  networks:
  #    - zeta-net

  # ------------ Microservizi ------------ #
  storage:
    build: ./storage
    ports:
      - "8082:8082"
    environment:
      - DATABASE_HOST=storage-db
      - DATABASE_PORT=5432
    depends_on:
      storage-db:
        condition: service_healthy
    networks:
      - zeta-net
  auth:
    build: auth
    ports:
      - "8081:8081"
    environment:
      - DATABASE_HOST=auth-db
      - DATABASE_PORT=3306
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - zeta-net
  userdetails:
    build: ./userdetails
    ports:
      - "8083:8083"
    environment:
      - DATABASE_HOST=userdetails-db
      - DATABASE_PORT=3306
    depends_on:
      userdetails-db:
        condition: service_healthy
    networks:
      - zeta-net

volumes:
  storage_data:
  auth_data:
  userdetails_data:

networks:
  zeta-net:
    driver: bridge